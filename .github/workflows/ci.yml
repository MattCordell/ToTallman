name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  # Validate the source lists and prove the committed build artifacts are not stale.
  # Guards Risk #1 (cross-language casefold parity) by ensuring the compiled artifact
  # always matches what the shared compiler produces from the source lists.
  lists:
    name: Lists (validate + freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/validator/package-lock.json

      - name: Install validator dependencies
        run: npm ci
        working-directory: tools/validator

      - name: Build lists from source extracts (regenerates list JSON)
        run: node tools/build-lists/build-lists.js

      - name: Fail if list JSON is stale (run build-lists.js to fix)
        run: git diff --exit-code -- tallman-lists/AU.json tallman-lists/NZ.json tallman-lists/FDA.json tallman-lists/ISMP.json tallman-lists/DEFAULT.json tallman-lists/compiled/provenance.json

      - name: Validate lists (regenerates manifest.json)
        run: npm run validate
        working-directory: tools/validator

      - name: Compile lists (regenerates compiled artifact)
        run: node tools/compile-lists/compile-lists.js

      - name: Fail if committed artifacts are stale
        run: git diff --exit-code -- tallman-lists/manifest.json tallman-lists/compiled/lists.compiled.json

  # Build the C# implementation and run its tests, then run the canonical suite
  # through the language-agnostic harness + adapter (the contract every Phase 4
  # language will reuse). pwsh is preinstalled on ubuntu-latest, so the C# pre-build
  # emitter (generate-embedded.ps1) runs without extra setup.
  csharp:
    name: C# build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: languages/csharp/**/*.csproj

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/test-runner/package-lock.json

      # Build the whole solution explicitly: `dotnet test` only builds the test
      # project and its dependencies, not the ToTallman.Demo project the shared
      # harness drives. The pre-build emitter (generate-embedded.ps1) runs here.
      # Pin -c Debug explicitly on both steps: the test-adapter resolves the demo
      # at bin/Debug/net8.0, so build and test must agree on the configuration.
      - name: Build solution (incl. demo used by the shared harness)
        run: dotnet build languages/csharp/ToTallman.sln -c Debug

      - name: Test (102 native + 99 canonical)
        run: dotnet test languages/csharp/ToTallman.sln -c Debug --no-build

      - name: Install test-runner dependencies
        run: npm ci
        working-directory: tools/test-runner

      - name: Canonical suite via shared harness + C# adapter
        run: node tools/test-runner/run-canonical-tests.js languages/csharp/test-adapter.js

  # Build the Python implementation, run linting/type-checking/tests, then run
  # the canonical suite through the shared harness + adapter.
  # Matrix covers the declared minimum (3.9) and current stable (3.12) so the
  # 3.9-compatibility claim in pyproject.toml is actually exercised in CI.
  python:
    name: Python ${{ matrix.python-version }} build + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: languages/python/pyproject.toml

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/test-runner/package-lock.json

      - name: Install package and dev dependencies
        run: pip install -e "languages/python[dev]"

      - name: Lint (ruff)
        run: python -m ruff check languages/python/src/ languages/python/tests/ languages/python/tools/

      - name: Format check (black)
        run: python -m black --check languages/python/src/ languages/python/tests/ languages/python/tools/

      - name: Type check (mypy)
        run: python -m mypy languages/python/src/totallman/ languages/python/tests/

      - name: Unit tests (pytest)
        run: python -m pytest languages/python/tests/ -v

      # Prove the committed _embedded_lists.py is not stale: regenerate and
      # fail if git sees any diff. The emitter already produces black-clean
      # output, so no separate reformat step is needed.
      - name: Embedded lists freshness check
        run: |
          python languages/python/tools/embed_lists.py
          git diff --exit-code -- languages/python/src/totallman/_embedded_lists.py

      - name: Install test-runner dependencies
        run: npm ci
        working-directory: tools/test-runner

      - name: Canonical suite via shared harness + Python adapter
        run: node tools/test-runner/run-canonical-tests.js languages/python/test-adapter.js

  # Build the Java implementation, run Spotless format check + JUnit tests, then run
  # the canonical suite through the shared harness + adapter.
  # Matrix covers the declared minimum (11) and current stable (17) so the
  # Java 11 compatibility claim is actually exercised in CI.
  java:
    name: Java ${{ matrix.java-version }} build + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['11', '17']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/test-runner/package-lock.json

      - name: Build and test (compile, Spotless check, JUnit 5)
        run: mvn -f languages/java/pom.xml verify --no-transfer-progress

      # Prove the committed EmbeddedTallmanLists.java is not stale: regenerate and
      # fail if git sees any diff. The generator produces idempotent output.
      - name: Embedded lists freshness check
        run: |
          node languages/java/tools/embed-lists.js
          git diff --exit-code -- languages/java/src/main/java/com/totallman/EmbeddedTallmanLists.java

      - name: Install test-runner dependencies
        run: npm ci
        working-directory: tools/test-runner

      - name: Canonical suite via shared harness + Java adapter
        run: node tools/test-runner/run-canonical-tests.js languages/java/test-adapter.js

  # Build the JS/TypeScript implementation, run lint/format/type-check/tests, then
  # run the canonical suite through the shared harness + adapter.
  # The JS adapter loads the built CJS module in-process (no subprocess needed
  # because the shared harness is already Node.js).
  js:
    name: JS/TypeScript build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            languages/js/package-lock.json
            tools/test-runner/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: languages/js

      - name: Lint (eslint)
        run: npm run lint
        working-directory: languages/js

      - name: Format check (prettier)
        run: npm run format:check
        working-directory: languages/js

      - name: Type check
        run: npm run typecheck
        working-directory: languages/js

      - name: Build (tsc CJS + ESM)
        run: npm run build
        working-directory: languages/js

      - name: Native tests (node:test)
        run: npm test
        working-directory: languages/js

      # Prove the committed embedded-lists.ts is not stale: regenerate and
      # fail if git sees any diff. The generator produces idempotent output.
      - name: Embedded lists freshness check
        run: |
          node languages/js/tools/embed-lists.js
          git diff --exit-code -- languages/js/src/embedded-lists.ts

      - name: Install test-runner dependencies
        run: npm ci
        working-directory: tools/test-runner

      - name: Canonical suite via shared harness + JS adapter
        run: node tools/test-runner/run-canonical-tests.js languages/js/test-adapter.js

  # Cross-language output parity check (guards Risk #1: canonical casefold parity).
  # Discovers all languages/*/test-adapter.js adapters and asserts every adapter
  # produces identical output for every canonical test input.
  parity:
    name: Cross-language output parity
    runs-on: ubuntu-latest
    # `python` here refers to the matrix job; GitHub Actions waits for ALL
    # matrix variants to succeed before treating the job as done.
    needs: [csharp, python, java, js]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: languages/csharp/**/*.csproj

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: languages/python/pyproject.toml

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: languages/js/package-lock.json

      # The C# adapter spawns `dotnet ToTallman.Demo.dll`; rebuild here so the
      # binary is present in this job's workspace.
      - name: Build C# (required by the C# adapter)
        run: dotnet build languages/csharp/ToTallman.sln -c Debug

      - name: Install Python package (required by the Python adapter)
        run: pip install -e languages/python

      # The Java adapter spawns `java -jar`; build the CLI jar here.
      - name: Build Java CLI jar (required by the Java adapter)
        run: mvn -f languages/java/pom.xml package -DskipTests -Dspotless.check.skip=true --no-transfer-progress

      # The JS adapter require()s the built CJS module in-process.
      - name: Build JS (required by the JS adapter)
        run: npm ci && npm run build
        working-directory: languages/js

      - name: Run cross-language parity check
        run: node tools/parity-check/run-parity-check.js
